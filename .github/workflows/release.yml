name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Build .exe
        run: |
          python -m PyInstaller --onefile --windowed --name "PQC-Encryptor" --hidden-import pqcrypto --hidden-import pqcrypto.kem.ml_kem_768 --hidden-import pqcrypto.sign.ml_dsa_65 --hidden-import argon2 --hidden-import argon2.low_level --clean --noconfirm pqc_encryptor.py

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd dist
          sha256sum PQC-Encryptor.exe > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Run round-trip test with .exe
        shell: bash
        run: |
          mkdir -p test_input/subdir
          echo "Hello PQC" > test_input/file1.txt
          echo "Nested file" > test_input/subdir/file2.txt
          dist/PQC-Encryptor.exe encrypt test_input test_output.pqc -p "test-passphrase-123"
          dist/PQC-Encryptor.exe decrypt test_output.pqc test_restored -p "test-passphrase-123"
          diff test_input/file1.txt test_restored/test_input/file1.txt
          diff test_input/subdir/file2.txt test_restored/test_input/subdir/file2.txt
          echo "Round-trip test PASSED"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PQC-Encryptor.exe
            dist/SHA256SUMS.txt
          body: |
            ## PQC Folder Encryptor ${{ github.ref_name }}

            ### Download
            - **PQC-Encryptor.exe** — Standalone Windows executable (no Python required)
            - **SHA256SUMS.txt** — Verify integrity with `sha256sum -c SHA256SUMS.txt`

            ### Verify download
            ```powershell
            certutil -hashfile PQC-Encryptor.exe SHA256
            ```
            Compare the hash with SHA256SUMS.txt.

            ### Algorithms
            ML-KEM-768 (FIPS 203) + AES-256-GCM + ML-DSA-65 (FIPS 204) + Argon2id
          generate_release_notes: true
