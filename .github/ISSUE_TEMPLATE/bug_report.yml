name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in the details below.

  - type: dropdown
    id: mode
    attributes:
      label: Mode
      options:
        - GUI
        - CLI
        - Standalone .exe
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g., Windows 11, Ubuntu 24.04"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python Version
      placeholder: "e.g., 3.12.1 (or N/A for .exe)"

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the application
        2. Select a folder...
        3. Click Encrypt...
    validations:
      required: true

  - type: textarea
    id: error
    attributes:
      label: Error message or log output
      render: shell

  - type: checkboxes
    id: sensitive
    attributes:
      label: Confirmation
      options:
        - label: I confirm this report does not contain any sensitive data, passwords, or encrypted file contents
          required: true
